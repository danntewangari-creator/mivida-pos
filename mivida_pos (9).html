// ── FIREBASE CLOUD SYNC ENGINE ─────────────────────────────
// Firebase URL: auto-loads from localStorage — set once, works forever
function getFirebaseUrl() {
  const stored = localStorage.getItem('mivida_firebase_url');
  const hardcoded = (window.__FIREBASE_DB_URL__ || '').replace(/\/$/,'');
  return (stored || hardcoded).replace(/\/$/,'').trim();
}
let FIREBASE_DB_URL = getFirebaseUrl();
// Auto-reconnect on every load if URL exists
if (FIREBASE_DB_URL) {
  console.log('✅ Firebase auto-connected:', FIREBASE_DB_URL);
}

// Track sync health for UI indicator
const syncState = { ok: null, lastError: null, lastWrite: null };

async function firebaseGet(key) {
  const res = await fetch(`${FIREBASE_DB_URL}/mivida/${key}.json`, { cache: 'no-store' });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.json();
}

async function firebaseSet(key, val) {
  const res = await fetch(`${FIREBASE_DB_URL}/mivida/${key}.json`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(val)
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return await res.json();
}

async function storageGet(key) {
  if (FIREBASE_DB_URL) {
    try {
      const data = await firebaseGet(key);
      syncState.ok = true; syncState.lastError = null;
      // Also keep local in sync
      try { localStorage.setItem('mivida_' + key, JSON.stringify(data)); } catch(e) {}
      return data;
    } catch(e) {
      syncState.ok = false; syncState.lastError = e.message;
      console.warn('Firebase GET failed:', e.message);
    }
  }
  // Fallback to local
  try { const v = localStorage.getItem('mivida_' + key); return v ? JSON.parse(v) : null; } catch { return null; }
}

async function storageSet(key, val) {
  // Always save locally first (instant)
  try { localStorage.setItem('mivida_' + key, JSON.stringify(val)); } catch(e) {}

  if (FIREBASE_DB_URL) {
    try {
      await firebaseSet(key, val);
      syncState.ok = true; syncState.lastError = null; syncState.lastWrite = new Date();
    } catch(e) {
      syncState.ok = false; syncState.lastError = e.message;
      console.warn('Firebase SET failed:', e.message);
      // Schedule retry in 3s
      setTimeout(async () => {
        try { await firebaseSet(key, val); syncState.ok = true; syncState.lastError = null; } catch(e2) {}
      }, 3000);
    }
  }
}

// On startup: if Firebase is empty but local has data, migrate it up
async function migrateLocalToFirebase() {
  if (!FIREBASE_DB_URL) return;
  try {
    const remoteSales = await firebaseGet('sales');
    if (!remoteSales || (Array.isArray(remoteSales) && remoteSales.length === 0)) {
      const localSales = localStorage.getItem('mivida_sales');
      if (localSales) {
        const parsed = JSON.parse(localSales);
        if (parsed && parsed.length > 0) {
          await firebaseSet('sales', parsed);
          console.log('Migrated', parsed.length, 'local sales to Firebase');
        }
      }
    }
  } catch(e) { console.warn('Migration check failed:', e.message); }
}
if (FIREBASE_DB_URL) setTimeout(migrateLocalToFirebase, 1000);

// Generates a stable device ID stored in localStorage
function getDeviceId() {
  let id = localStorage.getItem('mivida_device_id');
  if (!id) {
    id = 'device_' + Math.random().toString(36).substr(2, 8).toUpperCase();
    localStorage.setItem('mivida_device_id', id);
  }
  return id;
}

// Guess a friendly device name from userAgent
function getDeviceName() {
  const stored = localStorage.getItem('mivida_device_name');
  if (stored) return stored;
  const ua = navigator.userAgent;
  if (/iPhone/.test(ua)) return 'iPhone';
  if (/iPad/.test(ua)) return 'iPad';
  if (/Android/.test(ua)) {
    const m = ua.match(/Android[^;]*;\s*([^)]+)\)/);
    return m ? m[1].trim().split(' ').slice(0,2).join(' ') : 'Android';
  }
  if (/Windows/.test(ua)) return 'Windows PC';
  if (/Mac/.test(ua)) return 'MacBook';
  return 'Browser';
}

const DEVICE_ID = getDeviceId();
const DEVICE_NAME = getDeviceName();

async function heartbeat() {
  if (!FIREBASE_DB_URL) return;
  try {
    await fetch(`${FIREBASE_DB_URL}/mivida_admin/presence/${DEVICE_ID}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: DEVICE_NAME,
        lastSeen: Date.now(),
        screen: window.__currentScreen__ || 'pos'
      })
    });
  } catch(e) {}
}

async function fetchPresence() {
  if (!FIREBASE_DB_URL) return {};
  try {
    const res = await fetch(`${FIREBASE_DB_URL}/mivida_admin/presence.json`, { cache: 'no-store' });
    if (!res.ok) return {};
    return await res.json() || {};
  } catch(e) { return {}; }
}

// Start heartbeat: every 20s while page is open
if (FIREBASE_DB_URL) {
  heartbeat();
  setInterval(heartbeat, 20000);
  // Update screen on visibility change
  document.addEventListener('visibilitychange', () => { if (!document.hidden) heartbeat(); });
}

    if (cleaned.includes('console.firebase.google.com')) {

// ── APP LOGIN GATE ─────────────────────────────────────────
const APP_PASSWORD = '7890';

function LoginGate({ onEnter }) {
  const [pwd, setPwd] = useState('');
  const [error, setError] = useState(false);
  const [shake, setShake] = useState(false);
  const canvasRef = React.useRef(null);

  // ── WATER SIMULATION ────────────────────────────────────
  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let W = canvas.width = window.innerWidth;
    let H = canvas.height = window.innerHeight;
    let animId;

    // Particles
    const COLORS = ['#00ddff','#ff44cc','#cc00ff','#00aaff','#ffffff','#ffdd00','#00ee88'];
    const particles = [];
    const drops = [];
    const splashes = [];
    const ripples = [];

    // Spawn a falling drop
    function spawnDrop() {
      drops.push({
        x: Math.random() * W,
        y: -20,
        vy: 4 + Math.random() * 6,
        vx: (Math.random() - 0.5) * 1.5,
        r: 3 + Math.random() * 6,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        alpha: 0.7 + Math.random() * 0.3,
        trail: [],
      });
    }

    // Spawn a splash particle
    function spawnSplash(x, y, color) {
      for (let i = 0; i < 8 + Math.random() * 6; i++) {
        const angle = (Math.random() * Math.PI) - Math.PI; // upward hemisphere
        const speed = 2 + Math.random() * 6;
        splashes.push({
          x, y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 2,
          r: 1 + Math.random() * 3,
          alpha: 0.8 + Math.random() * 0.2,
          color,
          gravity: 0.25,
        });
      }
      ripples.push({ x, y, r: 2, maxR: 40 + Math.random() * 40, alpha: 0.6, color });
    }

    // Water pool at bottom
    const POOL_Y = H * 0.82;
    const wavePoints = [];
    const NUM_WAVES = 80;
    for (let i = 0; i <= NUM_WAVES; i++) {
      wavePoints.push({ x: (W / NUM_WAVES) * i, y: POOL_Y, vy: 0 });
    }
    function disturbWave(x) {
      const idx = Math.round((x / W) * NUM_WAVES);
      for (let d = -3; d <= 3; d++) {
        const i = idx + d;
        if (i >= 0 && i <= NUM_WAVES) {
          wavePoints[i].vy -= (3 - Math.abs(d)) * 1.5;
        }
      }
    }
    function updateWaves() {
      const K = 0.025, DAMP = 0.94, SPREAD = 0.12;
      for (let i = 0; i <= NUM_WAVES; i++) {
        wavePoints[i].vy += K * (POOL_Y - wavePoints[i].y);
        wavePoints[i].y += wavePoints[i].vy;
        wavePoints[i].vy *= DAMP;
      }
      for (let iter = 0; iter < 8; iter++) {
        for (let i = 1; i < NUM_WAVES; i++) {
          const diff = wavePoints[i].y - wavePoints[i-1].y;
          wavePoints[i-1].vy += SPREAD * diff;
          wavePoints[i].vy   -= SPREAD * diff;
        }
      }
    }

    function drawPool() {
      // Main water body
      ctx.save();
      const grad = ctx.createLinearGradient(0, POOL_Y, 0, H);
      grad.addColorStop(0,   'rgba(0,180,255,0.45)');
      grad.addColorStop(0.3, 'rgba(100,0,220,0.35)');
      grad.addColorStop(1,   'rgba(0,20,80,0.55)');
      ctx.beginPath();
      ctx.moveTo(0, H);
      for (let i = 0; i <= NUM_WAVES; i++) {
        ctx.lineTo(wavePoints[i].x, wavePoints[i].y);
      }
      ctx.lineTo(W, H);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();

      // Shimmer line on wave surface
      ctx.beginPath();
      ctx.moveTo(0, wavePoints[0].y);
      for (let i = 1; i <= NUM_WAVES; i++) {
        const mx = (wavePoints[i-1].x + wavePoints[i].x) / 2;
        const my = (wavePoints[i-1].y + wavePoints[i].y) / 2;
        ctx.quadraticCurveTo(wavePoints[i-1].x, wavePoints[i-1].y, mx, my);
      }
      ctx.strokeStyle = 'rgba(150,220,255,0.5)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
    }

    let frame = 0;
    function animate() {
      animId = requestAnimationFrame(animate);
      ctx.clearRect(0, 0, W, H);
      frame++;

      // Spawn drops at intervals
      if (frame % 18 === 0) spawnDrop();

      // Update & draw drops
      for (let i = drops.length - 1; i >= 0; i--) {
        const d = drops[i];
        d.trail.push({x: d.x, y: d.y});
        if (d.trail.length > 8) d.trail.shift();
        d.x += d.vx; d.y += d.vy; d.vy += 0.3;

        // Draw trail
        for (let t = 0; t < d.trail.length; t++) {
          const a = (t / d.trail.length) * d.alpha * 0.4;
          ctx.beginPath();
          ctx.arc(d.trail[t].x, d.trail[t].y, d.r * (t / d.trail.length) * 0.7, 0, Math.PI * 2);
          ctx.fillStyle = d.color.replace(')', `,${a})`).replace('rgb(','rgba(').replace('#', 'rgba(').slice(0,4) === 'rgba' ? d.color.replace(')', `,${a})`) : d.color;
          ctx.globalAlpha = a;
          ctx.fill();
        }
        // Draw drop
        ctx.globalAlpha = d.alpha;
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fillStyle = d.color;
        ctx.shadowColor = d.color;
        ctx.shadowBlur = 8;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;

        // Hit pool
        if (d.y + d.r >= wavePoints[Math.round((d.x / W) * NUM_WAVES)]?.y || d.y > H) {
          disturbWave(d.x);
          spawnSplash(d.x, Math.min(d.y, POOL_Y), d.color);
          drops.splice(i, 1);
        }
      }

      // Update waves
      updateWaves();
      drawPool();

      // Draw splashes
      for (let i = splashes.length - 1; i >= 0; i--) {
        const s = splashes[i];
        s.x += s.vx; s.y += s.vy; s.vy += s.gravity; s.alpha -= 0.025;
        if (s.alpha <= 0 || s.y > POOL_Y + 20) { splashes.splice(i, 1); continue; }
        ctx.globalAlpha = s.alpha;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = s.color;
        ctx.shadowColor = s.color;
        ctx.shadowBlur = 6;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
      }

      // Draw ripples
      for (let i = ripples.length - 1; i >= 0; i--) {
        const rp = ripples[i];
        rp.r += 1.5; rp.alpha -= 0.018;
        if (rp.alpha <= 0) { ripples.splice(i, 1); continue; }
        ctx.globalAlpha = rp.alpha;
        ctx.beginPath();
        ctx.ellipse(rp.x, rp.y, rp.r, rp.r * 0.3, 0, 0, Math.PI * 2);
        ctx.strokeStyle = rp.color;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    animate();

    const resize = () => {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      for (let i = 0; i <= NUM_WAVES; i++) {
        wavePoints[i].x = (W / NUM_WAVES) * i;
        wavePoints[i].y = H * 0.82;
      }
    };
    window.addEventListener('resize', resize);
    return () => { cancelAnimationFrame(animId); window.removeEventListener('resize', resize); };
  }, []);

  const handleKey = (digit) => {
    if (pwd.length >= 4) return;
    const newPwd = pwd + digit;
    setPwd(newPwd);
    setError(false);
    if (newPwd.length === 4) {
      if (newPwd === APP_PASSWORD) {
        onEnter();
      } else {
        setShake(true);
        setError(true);
        setTimeout(() => { setPwd(''); setShake(false); }, 700);
      }
    }
  };

  const handleDel = () => { setPwd(p => p.slice(0, -1)); setError(false); };

  const dotColors = ['#ff44cc','#00ddff','#ffdd00','#00ee88'];

  return (
    <div style={{minHeight:'100vh', background:'linear-gradient(145deg,#0a0520,#1a0540,#0d1545)',
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'20px'}}>

      {/* Water canvas background */}
      <canvas ref={canvasRef} style={{position:'fixed',inset:0,width:'100%',height:'100%',
        pointerEvents:'none', zIndex:0}} />
      {/* Subtle dark overlay blobs */}
      <div style={{position:'fixed',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:0}}>
        {[
          {color:'rgba(100,0,180,0.2)',size:'350px',top:'5%',left:'-10%'},
          {color:'rgba(0,50,150,0.15)',size:'300px',top:'50%',right:'-5%'},
        ].map((b,i) => (
          <div key={i} style={{position:'absolute',width:b.size,height:b.size,borderRadius:'50%',
            background:b.color,filter:'blur(80px)',top:b.top,left:b.left,right:b.right,bottom:b.bottom}} />
        ))}
      </div>

      <div style={{position:'relative',zIndex:1,display:'flex',flexDirection:'column',alignItems:'center',width:'100%',maxWidth:'320px'}}>
        {/* Logo area */}
        <div style={{marginBottom:'6px',fontSize:'3.5rem'}}>💧</div>
        <div style={{fontFamily:"'Cinzel',serif", fontSize:'1.6rem', fontWeight:'700', letterSpacing:'4px',
          background:'linear-gradient(135deg,#ff44cc,#00ddff,#ffdd00)',
          WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent',
          marginBottom:'4px', textAlign:'center'}}>
          MI VIDA
        </div>
        <div style={{fontFamily:"'Cinzel',serif", fontSize:'0.75rem', letterSpacing:'3px',
          color:'rgba(255,255,255,0.5)', textTransform:'uppercase', marginBottom:'32px'}}>
          Mineral Water · Mangu Branch
        </div>

        {/* PIN dots */}
        <div style={{display:'flex', gap:'16px', marginBottom:'10px',
          animation: shake ? 'shake 0.5s ease' : 'none'}}>
          {[0,1,2,3].map(i => (
            <div key={i} style={{width:'20px', height:'20px', borderRadius:'50%',
              background: i < pwd.length ? dotColors[i] : 'rgba(255,255,255,0.1)',
              border: '2px solid ' + (i < pwd.length ? dotColors[i] : 'rgba(255,255,255,0.25)'),

// ── PIN LOCK ───────────────────────────────────────────────
const ADMIN_PIN = '5678';       // Mi Vida Owner PIN — sees everything
const MANAGER_PIN = '34314398'; // Mi Vida Manager PIN — sees reports, NOT devices

function PinLock({ onUnlock, allowManager = false }) {
  // Who is trying to log in: null = choose, 'admin' = owner, 'manager' = manager
  const [role, setRole] = useState(allowManager ? null : 'admin');
  const [pin, setPin] = useState('');
  const [error, setError] = useState(false);
  const [shake, setShake] = useState(false);

  const targetPin = role === 'admin' ? ADMIN_PIN : MANAGER_PIN;
  const pinLen = targetPin ? targetPin.length : 0;

  const handleKey = (digit) => {
    if (pin.length >= pinLen) return;
    const newPin = pin + digit;
    setPin(newPin);
    setError(false);
    if (newPin.length === pinLen) {
      if (newPin === targetPin) {
        onUnlock(role);
      } else {
        setShake(true);
        setError(true);
        setTimeout(() => { setPin(''); setShake(false); }, 700);
      }
    }
  };

  const handleDel = () => { setPin(p => p.slice(0, -1)); setError(false); };

  const goBack = () => { setRole(null); setPin(''); setError(false); };

  // ── ROLE SELECTOR SCREEN ──
  if (allowManager && role === null) {
    return (
      <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
        minHeight:'60vh', padding:'30px', gap:'16px'}}>
        <div style={{fontSize:'2.2rem', marginBottom:'4px'}}>🔐</div>
        <div style={{fontFamily:"'Cinzel',serif", fontSize:'0.8rem', letterSpacing:'3px',
          color:'rgba(255,255,255,0.4)', textTransform:'uppercase', marginBottom:'20px'}}>
          Select Your Role
        </div>
        {/* Owner button */}
        <button onClick={() => setRole('admin')}
          style={{width:'100%', maxWidth:'280px', padding:'20px 24px',
            background:'linear-gradient(135deg,rgba(204,0,255,0.15),rgba(34,102,255,0.15))',
            border:'2px solid rgba(204,0,255,0.5)', borderRadius:'16px',
            cursor:'pointer', transition:'all 0.2s', textAlign:'left', display:'flex',
            alignItems:'center', gap:'16px'}}>
          <span style={{fontSize:'2rem'}}>👑</span>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif", fontWeight:'800',
              fontSize:'1.1rem', color:'#ff44cc', marginBottom:'3px'}}>Owner</div>
            <div style={{fontFamily:"'Cinzel',serif", fontSize:'0.65rem',
              color:'rgba(255,255,255,0.4)', letterSpacing:'1px'}}>FULL ACCESS</div>
          </div>
        </button>
        {/* Manager button */}
        <button onClick={() => setRole('manager')}
          style={{width:'100%', maxWidth:'280px', padding:'20px 24px',
            background:'linear-gradient(135deg,rgba(0,180,255,0.12),rgba(0,100,200,0.12))',
            border:'2px solid rgba(0,180,255,0.4)', borderRadius:'16px',
            cursor:'pointer', transition:'all 0.2s', textAlign:'left', display:'flex',
            alignItems:'center', gap:'16px'}}>
          <span style={{fontSize:'2rem'}}>📋</span>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif", fontWeight:'800',
              fontSize:'1.1rem', color:'#00ddff', marginBottom:'3px'}}>Manager</div>
            <div style={{fontFamily:"'Cinzel',serif", fontSize:'0.65rem',
              color:'rgba(255,255,255,0.4)', letterSpacing:'1px'}}>REPORTS ACCESS</div>
          </div>
        </button>
      </div>
    );
  }

  // ── PIN ENTRY SCREEN ──
  const isOwner = role === 'admin';
  const accentColor = isOwner ? '#ff44cc' : '#00ddff';
  const roleLabel = isOwner ? '👑 Owner PIN' : '📋 Manager PIN';

  return (
    <div style={{display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      minHeight:'60vh', padding:'20px'}}>
      {/* Back button (only when there's a choice) */}
      {allowManager && (
        <button onClick={goBack}
          style={{alignSelf:'flex-start', marginBottom:'16px', background:'none', border:'none',
            color:'rgba(255,255,255,0.4)', cursor:'pointer', fontFamily:"'Cinzel',serif",
            fontSize:'0.72rem', letterSpacing:'1px', display:'flex', alignItems:'center', gap:'6px'}}>
          ← Back
        </button>
      )}
      <div style={{fontSize:'2rem', marginBottom:'8px'}}>{isOwner ? '👑' : '📋'}</div>
      <div style={{fontFamily:"'Cinzel',serif", fontSize:'0.8rem', letterSpacing:'3px',
        color: accentColor, textTransform:'uppercase', marginBottom:'28px', fontWeight:'700',
        textShadow:`0 0 12px ${accentColor}66`}}>
        {roleLabel}
      </div>
      {/* PIN dots */}
      <div style={{display:'flex', gap:'12px', marginBottom:'10px',
        animation: shake ? 'shake 0.5s ease' : 'none'}}>
        {Array.from({length: pinLen}).map((_, i) => (
          <div key={i} style={{width:'18px', height:'18px', borderRadius:'50%',
            background: i < pin.length ? accentColor : 'rgba(255,255,255,0.1)',
            border: '2px solid ' + (i < pin.length ? accentColor : 'rgba(255,255,255,0.2)'),
            transition:'all 0.15s',
            boxShadow: i < pin.length ? `0 0 10px ${accentColor}` : 'none'}} />
        ))}
      </div>
      <div style={{height:'28px', marginBottom:'20px', display:'flex', alignItems:'center'}}>
        {error
          ? <div style={{color:'#ff2255', fontSize:'0.78rem', fontFamily:"'Cinzel',serif",
              letterSpacing:'1px'}}>Wrong PIN — try again</div>
          : <div style={{color:'rgba(255,255,255,0.25)', fontSize:'0.72rem',
              fontFamily:"'Cinzel',serif", letterSpacing:'1px'}}>
              Enter {pinLen}-digit PIN
            </div>
        }
      </div>
      {/* Numpad */}
      <div style={{display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'10px', width:'230px'}}>
        {[1,2,3,4,5,6,7,8,9,'',0,'⌫'].map((k, i) => (
          <button key={i} onClick={() => k === '⌫' ? handleDel() : k !== '' ? handleKey(String(k)) : null}
            style={{padding:'17px', borderRadius:'12px',
              background: k === '' ? 'transparent'
                : k === '⌫' ? 'rgba(255,34,85,0.1)'
                : `rgba(255,255,255,0.06)`,
              border: k === '' ? 'none'
                : k === '⌫' ? '1px solid rgba(255,34,85,0.3)'
                : `1px solid rgba(255,255,255,0.1)`,
              color: k === '⌫' ? '#ff2255' : 'var(--white)',
              fontFamily:"'Playfair Display',serif", fontSize:'1.25rem', fontWeight:'700',
              cursor: k === '' ? 'default' : 'pointer', transition:'all 0.15s'}}>
            {k}
          </button>
        ))}
      </div>
      <style>{`
        @keyframes shake {
          0%,100%{transform:translateX(0)}
          20%{transform:translateX(-8px)} 40%{transform:translateX(8px)}
          60%{transform:translateX(-6px)} 80%{transform:translateX(6px)}
        }
      `}</style>
    </div>
  );
}

// ── POS SCREEN ─────────────────────────────────────────────
function POSScreen({ onSaleComplete }) {
  const [tab, setTab] = useState('refill');
  const [cart, setCart] = useState([]);
  const [showCheckout, setShowCheckout] = useState(false);
  const [showSuccess, setShowSuccess] = useState(false);
  const [successData, setSuccessData] = useState(null);

  const addToCart = (product) => {
    setCart(prev => {
      const existing = prev.find(i => i.id === product.id);
      if (existing) return prev.map(i => i.id === product.id ? { ...i, qty: i.qty + 1 } : i);
      return [...prev, { ...product, qty: 1 }];
    });
  };

  const updateQty = (id, delta) => {
    setCart(prev => {
      const updated = prev.map(i => i.id === id ? { ...i, qty: i.qty + delta } : i).filter(i => i.qty > 0);
      return updated;
    });
  };

  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);

  const handleSale = async (sale) => {
    const sales = (await storageGet('sales')) || [];
    sales.push(sale);
    await storageSet('sales', sales);
    setCart([]);
    setShowCheckout(false);
    setSuccessData(sale);
    setShowSuccess(true);
    onSaleComplete && onSaleComplete();
    setTimeout(() => setShowSuccess(false), 2500);
  };

  return (
    <div>
      <div className="section-tabs">
        {['refill', 'packaging'].map(t2 => (
          <button key={t2} className={`tab-pill ${tab === t2 ? 'active' : ''}`} onClick={() => setTab(t2)}>
            {t2 === 'refill' ? '💧 Refills' : '🧴 Packaging'}
          </button>
        ))}
      </div>

      <div className="product-grid">
        {PRODUCTS[tab].map(p => (
          <div key={p.id} className="product-card" onClick={() => addToCart(p)}>
            <div className="prod-size">{p.size}</div>
            <div className="prod-name">{p.name}</div>
            <div className="prod-price">{fmtShort(p.price)} <span>KSH</span></div>
          </div>
        ))}
      </div>

      <div className="cart-section">
        <div className="cart-title-row">
          <div className="card-title" style={{margin:0}}>🛒 Cart</div>
          {cart.length > 0 && <button className="clear-btn" onClick={() => setCart([])}>Clear all</button>}
        </div>
        {cart.length === 0
          ? <div className="cart-empty">Tap a product to add it</div>
          : cart.map(item => (
            <div key={item.id} className="cart-item">
              <div className="cart-item-name">{item.size} {item.name}</div>
              <div className="qty-ctrl">
                <button className="qty-btn" onClick={() => updateQty(item.id, -1)}>-</button>
                <div className="qty-num">{item.qty}</div>
                <button className="qty-btn" onClick={() => updateQty(item.id, 1)}>+</button>
              </div>
              <div className="cart-item-price">{fmtShort(item.price * item.qty)}</div>
            </div>
          ))
        }
        {cart.length > 0 && (
          <>
            <div className="cart-total">
              <div className="total-label">Total</div>
              <div className="total-amount">{fmt(total)}</div>
            </div>
            <button className="checkout-btn" onClick={() => setShowCheckout(true)}>
              Proceed to Payment →
            </button>
          </>
        )}
      </div>

      {showCheckout && (
        <CheckoutModal cart={cart} total={total} onConfirm={handleSale} onClose={() => setShowCheckout(false)} />
      )}
      {showSuccess && successData && (
        <div className="modal-overlay">
          <div className="modal success-modal">
            <div className="success-icon">✅</div>
            <div className="success-title">Sale Complete!</div>
            <div className="success-sub">{fmt(successData.total)} via {successData.paymentMethod}</div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── CHECKOUT MODAL ─────────────────────────────────────────
function CheckoutModal({ cart, total, onConfirm, onClose }) {
  const [method, setMethod] = useState(null);
  const [cash, setCash] = useState('');
  const [mpesaRef, setMpesaRef] = useState('');
  const change = cash ? Math.max(0, parseFloat(cash) - total) : 0;
  const canConfirm = method === 'M-Pesa' ? mpesaRef.trim().length >= 3
    : method === 'Cash' ? parseFloat(cash) >= total : false;

  const confirm = () => {
    const sale = {
      id: Date.now().toString(),
      timestamp: Date.now(),
      date: todayKey(),
      items: cart.map(i => ({ id: i.id, name: `${i.size} ${i.name}`, price: i.price, qty: i.qty, category: i.category, liters: i.liters })),
      total,
      paymentMethod: method,
      mpesaRef: mpesaRef || null,
      cashGiven: cash ? parseFloat(cash) : null,
      change: change || 0,
    };
    onConfirm(sale);
  };

  return (
    <div className="modal-overlay">
      <div className="modal">
        <div className="modal-title">💳 Payment</div>
        <div className="modal-total">{fmt(total)}</div>

        <div style={{marginBottom:8, fontSize:'0.72rem', color:'rgba(255,255,255,0.4)'}}>SELECT PAYMENT METHOD</div>
        <div className="pay-methods">
          {[{key:'Cash', icon:'💵'}, {key:'M-Pesa', icon:'📱'}].map(m => (
            <button key={m.key} className={`pay-btn ${method === m.key ? 'selected' : ''}`} onClick={() => setMethod(m.key)}>
              <span className="pay-icon">{m.icon}</span>
              {m.key}
            </button>
          ))}
        </div>

        {method === 'Cash' && (
          <>
            <div className="input-label">Cash Given (KSH)</div>
            <input className="input-field" type="number" placeholder="Enter amount" value={cash}
              onChange={e => setCash(e.target.value)} autoFocus />
            {cash && parseFloat(cash) >= total && (
              <div className="change-display">
                <span className="change-label">Change</span>
                <span className="change-amount">{fmt(change)}</span>
              </div>
            )}
            {cash && parseFloat(cash) < total && (
              <div style={{color:'#e63946', fontSize:'0.72rem', marginBottom:'10px'}}>⚠️ Amount is less than total</div>
            )}
          </>
        )}

        {method === 'M-Pesa' && (
          <>
            <div className="mpesa-ref">📱 Ask customer to send <strong>{fmt(total)}</strong> to the Mpesa Till/Paybill number, then enter the confirmation code below.</div>
            <div className="input-label">M-Pesa Reference Code</div>
            <input className="input-field" placeholder="e.g. RHX4A2B9K0" value={mpesaRef}
              onChange={e => setMpesaRef(e.target.value.toUpperCase())} autoFocus />
          </>
        )}

        <div className="modal-actions">
          <button className="btn-cancel" onClick={onClose}>Cancel</button>
          <button className="btn-confirm" onClick={confirm} disabled={!canConfirm}>
            Confirm Sale ✓
          </button>
        </div>
      </div>
    </div>
  );
}

// ── INVENTORY SCREEN ───────────────────────────────────────
function InventoryScreen() {
  const [inv, setInv] = useState(null);
  const [meterReadings, setMeterReadings] = useState([]);
  const [meterVal, setMeterVal] = useState('');
  const [meterDate, setMeterDate] = useState(todayKey());
  const [stockInputs, setStockInputs] = useState({});

  const defaultInv = {
    bottles20l: 0, bottles10l: 0, bottles5l: 0, bottles1l: 0, bottles500ml: 0,
    stickers: 0, seals: 0,
  };

  useEffect(() => {
    (async () => {
      const saved = await storageGet('inventory');
      setInv(saved || defaultInv);
      const mr = await storageGet('meter_readings');
      setMeterReadings(mr || []);
    })();
  }, []);

  const saveInv = async (newInv) => {
    setInv(newInv);
    await storageSet('inventory', newInv);
  };

  const addStock = async (key) => {
    const val = parseInt(stockInputs[key]) || 0;
    if (!val) return;
    const newInv = { ...inv, [key]: (inv[key] || 0) + val };
    await saveInv(newInv);
    setStockInputs(prev => ({ ...prev, [key]: '' }));
  };

  const addMeterReading = async () => {
    if (!meterVal) return;
    const newReading = { date: meterDate, reading: parseFloat(meterVal), timestamp: Date.now() };
    const updated = [newReading, ...meterReadings].slice(0, 30);
    setMeterReadings(updated);
    await storageSet('meter_readings', updated);
    setMeterVal('');
    setMeterDate(todayKey());
  };

  const stockItems = [
    { key: 'bottles20l', label: '20L Bottles', icon: '🪣' },
    { key: 'bottles10l', label: '10L Bottles', icon: '🫙' },
    { key: 'bottles5l', label: '5L Bottles', icon: '🍶' },
    { key: 'bottles1l', label: '1L Bottles', icon: '🍾' },
    { key: 'bottles500ml', label: '500ml Bottles', icon: '💧' },
    { key: 'stickers', label: 'Stickers', icon: '🏷️' },
    { key: 'seals', label: 'Seals', icon: '🔒' },
  ];

  if (!inv) return <div className="empty-state">Loading inventory...</div>;

  return (
    <div>
      {/* Meter Reading */}
      <div className="card">
        <div className="card-title">📊 Water Meter Reading</div>
        <div className="meter-form">
          <div className="meter-input-wrap">
            <div className="input-label">Date</div>
            <input className="input-field" type="date" value={meterDate} onChange={e => setMeterDate(e.target.value)} style={{marginBottom:0}} />
          </div>
          <div className="meter-input-wrap">
            <div className="input-label">Reading (L)</div>
            <input className="input-field" type="number" placeholder="e.g. 12340" value={meterVal}
              onChange={e => setMeterVal(e.target.value)} style={{marginBottom:0}} />
          </div>
          <button className="meter-submit" onClick={addMeterReading}>Save</button>
        </div>
        {meterReadings.length > 0 && (
          <div className="meter-history">
            <div style={{marginTop:12}}>
              {meterReadings.slice(0, 8).map((r, i) => {
                const prev = meterReadings[i + 1];
                const diff = prev ? (r.reading - prev.reading).toFixed(0) : null;
                return (
                  <div key={r.timestamp} className="meter-row">
                    <span className="meter-date">{r.date}</span>
                    <span className="meter-reading">{Number(r.reading).toLocaleString()} L</span>
                    {diff !== null && <span className="meter-diff">+{diff} L used</span>}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>

      {/* Stock */}
      <div className="card">
        <div className="card-title">📦 Packaging Stock</div>
        <div className="inv-grid">
          {stockItems.map(({ key, label, icon }) => (
            <div key={key} className="inv-item">
              <div className="inv-item-name">{icon} {label}</div>
              <div className="inv-item-qty">{(inv[key] || 0).toLocaleString()}</div>
              <div className="inv-ctrl">
                <input className="inv-input" type="number" placeholder="+qty"
                  value={stockInputs[key] || ''} onChange={e => setStockInputs(p => ({ ...p, [key]: e.target.value }))} />
                <button className="inv-add-btn" onClick={() => addStock(key)}>ADD</button>
                <button className="qty-btn" style={{background:'rgba(230,57,70,0.1)',borderColor:'rgba(230,57,70,0.2)',color:'#e63946'}}
                  onClick={async () => {
                    const newInv = { ...inv, [key]: Math.max(0, (inv[key] || 0) - 1) };
                    await saveInv(newInv);
                  }}>-</button>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

    setLastSync(new Date());

    else setSyncing(false);

// ── BACKDATE SCREEN ────────────────────────────────────────
function BackdateScreen({ onSaleComplete }) {
  const [date, setDate] = useState(todayKey());
  const [time, setTime] = useState('12:00');
  const [tab, setTab] = useState('refill');
  const [cart, setCart] = useState([]);
  const [method, setMethod] = useState(null);
  const [mpesaRef, setMpesaRef] = useState('');
  const [cash, setCash] = useState('');
  const [saving, setSaving] = useState(false);
  const [successMsg, setSuccessMsg] = useState('');
  const [batchMode, setBatchMode] = useState(false);
  const [batchText, setBatchText] = useState('');
  const [batchError, setBatchError] = useState('');

  const addToCart = (product) => {
    setCart(prev => {
      const existing = prev.find(i => i.id === product.id);
      if (existing) return prev.map(i => i.id === product.id ? { ...i, qty: i.qty + 1 } : i);
      return [...prev, { ...product, qty: 1 }];
    });
  };

  const updateQty = (id, delta) => {
    setCart(prev => prev.map(i => i.id === id ? { ...i, qty: i.qty + delta } : i).filter(i => i.qty > 0));
  };

  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const change = cash ? Math.max(0, parseFloat(cash) - total) : 0;
  const canSave = cart.length > 0 && method && (method === 'M-Pesa' ? mpesaRef.trim().length >= 3 : parseFloat(cash) >= total);

  const saveSale = async () => {
    setSaving(true);
    const [h, m] = time.split(':');
    const ts = new Date(`${date}T${h}:${m}:00`).getTime();
    const sale = {
      id: `bd_${Date.now()}`,
      timestamp: ts,
      date,
      backdated: true,
      items: cart.map(i => ({ id: i.id, name: `${i.size} ${i.name}`, price: i.price, qty: i.qty, category: i.category, liters: i.liters })),
      total,
      paymentMethod: method,
      mpesaRef: mpesaRef || null,
      cashGiven: cash ? parseFloat(cash) : null,
      change: change || 0,
    };
    const sales = (await storageGet('sales')) || [];
    sales.push(sale);
    await storageSet('sales', sales);
    setCart([]);
    setMethod(null);
    setCash('');
    setMpesaRef('');
    setSaving(false);
    setSuccessMsg(`✅ Sale of ${fmt(total)} saved for ${date}`);
    onSaleComplete && onSaleComplete();
    setTimeout(() => setSuccessMsg(''), 3000);
  };

  // Batch import: parse simple CSV-like text
  // Format per line: date, productID, qty, method (optional mpesa ref)
  // e.g. "2025-01-15, r20l, 3, Cash"
  const productMap = {};
  ALL_PRODUCTS.forEach(p => { productMap[p.id] = p; productMap[p.size.toLowerCase().replace(' ','')] = p; });

  const parseBatch = async () => {
    setBatchError('');
    const lines = batchText.trim().split('\n').filter(l => l.trim());
    const sales = (await storageGet('sales')) || [];
    let added = 0;
    const errors = [];
    for (const line of lines) {
      const parts = line.split(',').map(s => s.trim());
      if (parts.length < 4) { errors.push(`Bad line: "${line}"`); continue; }
      const [d, pid, qtyStr, meth, ref] = parts;
      const prod = productMap[pid.toLowerCase()] || ALL_PRODUCTS.find(p => p.size.toLowerCase() === pid.toLowerCase() && p.name.toLowerCase() === 'refill');
      if (!prod) { errors.push(`Unknown product "${pid}" in: "${line}"`); continue; }
      const qty = parseInt(qtyStr);
      if (!qty || qty < 1) { errors.push(`Bad qty in: "${line}"`); continue; }
      const mNorm = meth.toLowerCase().includes('mpesa') || meth.toLowerCase().includes('m-pesa') ? 'M-Pesa' : 'Cash';
      const sale = {
        id: `bd_${Date.now()}_${added}`,
        timestamp: new Date(`${d}T12:00:00`).getTime(),
        date: d,
        backdated: true,
        items: [{ id: prod.id, name: `${prod.size} ${prod.name}`, price: prod.price, qty, category: prod.category, liters: prod.liters }],
        total: prod.price * qty,
        paymentMethod: mNorm,
        mpesaRef: ref || null,
        cashGiven: null, change: 0,
      };
      sales.push(sale);
      added++;
    }
    await storageSet('sales', sales);
    if (errors.length) setBatchError(errors.join('\n'));
    else {
      setBatchText('');
      setSuccessMsg(`✅ ${added} sales imported successfully!`);
      onSaleComplete && onSaleComplete();
      setTimeout(() => setSuccessMsg(''), 3000);
    }
  };

  return (
    <div>
      <div style={{marginBottom:14}}>
        <div style={{display:'flex',gap:8,marginBottom:4}}>
          <button className={`tab-pill ${!batchMode ? 'active' : ''}`} onClick={() => setBatchMode(false)}>📝 Single Entry</button>
          <button className={`tab-pill ${batchMode ? 'active' : ''}`} onClick={() => setBatchMode(true)}>📋 Bulk Import</button>
        </div>
        <div style={{fontSize:'0.7rem',color:'rgba(255,255,255,0.35)'}}>Enter historical sales from January onwards</div>
      </div>

      {successMsg && (
        <div style={{background:'rgba(46,196,182,0.12)',border:'1px solid rgba(46,196,182,0.3)',borderRadius:10,
          padding:'10px 14px',marginBottom:12,fontSize:'0.8rem',color:'var(--green)'}}>
          {successMsg}
        </div>
      )}

      {!batchMode ? (
        <>
          {/* Date + Time */}
          <div className="card">
            <div className="card-title">📅 Sale Date & Time</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div>
                <div className="input-label">Date</div>
                <input className="input-field" type="date" value={date}
                  max={todayKey()} min="2025-01-01"
                  onChange={e => setDate(e.target.value)} style={{marginBottom:0}} />
              </div>
              <div>
                <div className="input-label">Time (approx)</div>
                <input className="input-field" type="time" value={time}
                  onChange={e => setTime(e.target.value)} style={{marginBottom:0}} />
              </div>
            </div>
          </div>

          {/* Products */}
          <div className="section-tabs">
            {['refill', 'packaging'].map(t2 => (
              <button key={t2} className={`tab-pill ${tab === t2 ? 'active' : ''}`} onClick={() => setTab(t2)}>
                {t2 === 'refill' ? '💧 Refills' : '🧴 Packaging'}
              </button>
            ))}
          </div>
          <div className="product-grid">
            {PRODUCTS[tab].map(p => (
              <div key={p.id} className="product-card" onClick={() => addToCart(p)}>
                <div className="prod-size">{p.size}</div>
                <div className="prod-name">{p.name}</div>
                <div className="prod-price">{fmtShort(p.price)} <span>KSH</span></div>
              </div>
            ))}
          </div>

          {/* Cart */}
          <div className="cart-section">
            <div className="cart-title-row">
              <div className="card-title" style={{margin:0}}>🛒 Items</div>
              {cart.length > 0 && <button className="clear-btn" onClick={() => setCart([])}>Clear</button>}
            </div>
            {cart.length === 0
              ? <div className="cart-empty">Tap products to add</div>
              : cart.map(item => (
                <div key={item.id} className="cart-item">
                  <div className="cart-item-name">{item.size} {item.name}</div>
                  <div className="qty-ctrl">
                    <button className="qty-btn" onClick={() => updateQty(item.id, -1)}>-</button>
                    <div className="qty-num">{item.qty}</div>
                    <button className="qty-btn" onClick={() => updateQty(item.id, 1)}>+</button>
                  </div>
                  <div className="cart-item-price">{fmtShort(item.price * item.qty)}</div>
                </div>
              ))
            }

            {cart.length > 0 && (
              <>
                <div className="cart-total">
                  <div className="total-label">Total</div>
                  <div className="total-amount">{fmt(total)}</div>
                </div>

                {/* Payment method */}
                <div style={{marginTop:12}}>
                  <div className="input-label" style={{marginBottom:8}}>Payment Method</div>
                  <div className="pay-methods">
                    {[{key:'Cash', icon:'💵'}, {key:'M-Pesa', icon:'📱'}].map(m => (
                      <button key={m.key} className={`pay-btn ${method === m.key ? 'selected' : ''}`} onClick={() => setMethod(m.key)}>
                        <span className="pay-icon">{m.icon}</span>{m.key}
                      </button>
                    ))}
                  </div>
                  {method === 'Cash' && (
                    <>
                      <div className="input-label">Cash Given</div>
                      <input className="input-field" type="number" placeholder="Enter cash amount"
                        value={cash} onChange={e => setCash(e.target.value)} />
                    </>
                  )}
                  {method === 'M-Pesa' && (
                    <>
                      <div className="input-label">M-Pesa Ref (optional for backdated)</div>
                      <input className="input-field" placeholder="e.g. RHX4A2B9K0 or UNKNOWN"
                        value={mpesaRef} onChange={e => setMpesaRef(e.target.value.toUpperCase())} />
                    </>
                  )}
                </div>

                <button className="checkout-btn" onClick={saveSale}
                  disabled={!canSave || saving} style={{marginTop:10}}>
                  {saving ? 'Saving...' : `💾 Save Sale for ${date}`}
                </button>
              </>
            )}
          </div>
        </>
      ) : (
        /* Bulk Import */
        <div className="card">
          <div className="card-title">📋 Bulk Import</div>
          <div style={{fontSize:'0.73rem',color:'rgba(255,255,255,0.45)',marginBottom:12,lineHeight:1.6}}>
            Enter one sale per line in this format:<br/>
            <code style={{color:'var(--aqua)',background:'rgba(0,180,216,0.1)',padding:'2px 6px',borderRadius:4}}>
              date, productID, qty, method
            </code><br/><br/>
            <strong style={{color:'var(--foam)'}}>Product IDs:</strong><br/>
            {ALL_PRODUCTS.map(p => <span key={p.id} style={{display:'inline-block',margin:'1px 4px 1px 0',padding:'1px 6px',
              background:'rgba(255,255,255,0.06)',borderRadius:4,fontSize:'0.66rem',color:'var(--teal)'}}>
              {p.id} = {p.size} {p.name} ({p.price} KSH)
            </span>)}<br/><br/>
            <strong style={{color:'var(--foam)'}}>Example:</strong><br/>
            <code style={{color:'rgba(255,255,255,0.4)',fontSize:'0.68rem'}}>
              2025-01-10, r20l, 5, Cash<br/>
              2025-01-10, p1l, 12, M-Pesa, RHX4A2B9K0<br/>
              2025-01-11, r10l, 3, Cash
            </code>
          </div>
          <textarea
            style={{width:'100%',minHeight:180,padding:'12px',background:'rgba(255,255,255,0.04)',
              border:'1px solid var(--border)',borderRadius:10,color:'var(--white)',fontSize:'0.78rem',
              fontFamily:'monospace',lineHeight:1.7,resize:'vertical'}}
            placeholder={"2025-01-10, r20l, 5, Cash\n2025-01-10, p1l, 12, M-Pesa"}
            value={batchText}
            onChange={e => setBatchText(e.target.value)}
          />
          {batchError && (
            <div style={{background:'rgba(230,57,70,0.1)',border:'1px solid rgba(230,57,70,0.3)',borderRadius:8,
              padding:'10px',marginTop:8,fontSize:'0.7rem',color:'#e63946',whiteSpace:'pre-wrap'}}>
              {batchError}
            </div>
          )}
          <button className="checkout-btn" style={{marginTop:12}}
            onClick={parseBatch} disabled={!batchText.trim()}>
            📥 Import All Sales
          </button>
        </div>
      )}
    </div>
  );
}
